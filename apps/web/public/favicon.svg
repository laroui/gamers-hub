<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#080b12"/>
  <text x="16" y="23" font-family="Arial Black, sans-serif" font-size="16"
    font-weight="900" fill="#00e5ff" text-anchor="middle"
    filter="url(#glow)">GH</text>
