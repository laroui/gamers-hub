version: "3.9"

# ============================================================
#  DEV OVERRIDE — mounts source, enables hot reload
#  Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#  Or just: pnpm docker:up (configured in package.json)
# ============================================================

services:
  api:
    build:
      target: development
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    environment:
      NODE_ENV: development
    command: pnpm --filter api run dev

  worker:
    build:
      target: development
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
      - /app/node_modules
    environment:
      NODE_ENV: development
    command: pnpm --filter worker run dev

  web:
    build:
      target: development
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
    command: pnpm --filter web run dev -- --host 0.0.0.0
