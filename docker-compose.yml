version: "3.9"

# ============================================================
#  GAMERS HUB — Docker Compose (Self-Hosted Stack)
#  Usage:
#    pnpm docker:up      → start all services
#    pnpm docker:down    → stop all services
#    pnpm docker:logs    → follow logs
#    pnpm docker:reset   → wipe volumes and restart fresh
# ============================================================

networks:
  gamers-hub:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gh_postgres
    restart: unless-stopped
    networks: [gamers-hub]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamers_hub}
      POSTGRES_USER: ${POSTGRES_USER:-gamers_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gamers_hub} -d ${POSTGRES_DB:-gamers_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gh_redis
    restart: unless-stopped
    networks: [gamers-hub]
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible — cover art cache) ───────────────
  minio:
    image: minio/minio:latest
    container_name: gh_minio
    restart: unless-stopped
    networks: [gamers-hub]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_changeme}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO bucket initializer (runs once then exits) ───────
  minio-init:
    image: minio/mc:latest
    container_name: gh_minio_init
    networks: [gamers-hub]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin_changeme};
        mc mb --ignore-existing local/${MINIO_BUCKET_COVERS:-game-covers};
        mc anonymous set download local/${MINIO_BUCKET_COVERS:-game-covers};
        echo 'MinIO buckets ready';
      "

  # ── Fastify API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gh_api
    restart: unless-stopped
    networks: [gamers-hub]
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── BullMQ Worker (platform sync jobs) ───────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: gh_worker
    restart: unless-stopped
    networks: [gamers-hub]
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Vite Web (served via Nginx in production) ─────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: gh_web
    restart: unless-stopped
    networks: [gamers-hub]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

# ============================================================
#  DEV ONLY: override with docker-compose.dev.yml
#  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================
